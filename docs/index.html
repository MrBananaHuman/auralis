        const scaleNotes = mt.getScale(currentKey);

        diatonicInfo.forEach((info, idx) => {
            const rootName = scaleNotes[idx].match(/^[A-Ga-g][b#]?/)[0];
            const btn = document.createElement('button');
            btn.className = 'mini-btn degree-btn';
            btn.innerHTML = `<span class="degree-roman">${['I', 'ii', 'iii', 'IV', 'V', 'vi', 'vii°'][idx]}</span><br>${rootName}${info.suffix}`;
            btn.onclick = () => {
                currentQuickRoot = rootName;
                currentQuickType = info.type;
                
                // Update other buttons
                container.querySelectorAll('.mini-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Find matching root and type buttons to sync UI
                container.querySelectorAll('#root-btns .mini-btn').forEach(b => {
                    if (b.textContent === rootName) b.classList.add('active');
                });
                const targetTypeText = info.type.replace('Major', 'Maj').replace('Minor', 'Min');
                container.querySelectorAll('#type-btns .mini-btn').forEach(b => {
                    if (b.textContent === targetTypeText) b.classList.add('active');
                });

                highlightQuickChord();
            };
            diatonicContainer.appendChild(btn);
        });
    });

    // Render Quick Select Buttons
    roots.forEach(r => {
        const btn = document.createElement('button');
        btn.className = `mini-btn ${r === currentQuickRoot ? 'active' : ''}`;
        btn.textContent = r;
        btn.onclick = () => {
            currentQuickRoot = r;
            container.querySelectorAll('#root-btns .mini-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            highlightQuickChord();
        };
        rootContainer.appendChild(btn);
    });

    types.forEach(t => {
        const btn = document.createElement('button');
        btn.className = `mini-btn ${t === currentQuickType ? 'active' : ''}`;
        btn.textContent = t.replace('Major', 'Maj').replace('Minor', 'Min');
        btn.onclick = () => {
            currentQuickType = t;
            container.querySelectorAll('#type-btns .mini-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            highlightQuickChord();
        };
        typeContainer.appendChild(btn);
    });

    const highlightQuickChord = () => {
        if (isPlaying) return;
        selectedMidis.clear();
        selectedCells = [];
        isGuidanceActive = true;
        
        // Reset fret states
        document.querySelectorAll('.fret').forEach(f => {
            f.classList.remove('midi-user', 'selected', 'candidate', 'dimmed');
            const m = f.querySelector('.note-marker');
            if (m) m.classList.add('hidden');
        });

        // Get chord notes from musicTheory
        Promise.resolve({ MAJOR_DIATONIC_CHORDS, getScale, getChordNotes }).then(mt => {
            const chordNotes = mt.getChordNotes(currentQuickRoot, currentQuickType);
            const noteNames = chordNotes.map(n => n.match(/^[A-Ga-g][b#]?/)[0]);
            
            document.querySelectorAll('.fret').forEach(fret => {
                const noteName = fret.dataset.note;
                if (noteNames.includes(noteName)) {
                    fret.classList.add('candidate');
                    const marker = fret.querySelector('.note-marker');
                    if (marker) marker.classList.remove('hidden');
                }
            });
            updateAnalysis();
            // Preview sound
            const previewMidis = Array.from(new Set(document.querySelectorAll('.fret.candidate')).values())
                .slice(0, 4)
                .map(f => parseInt(f.dataset.midi));
            playChord(previewMidis);
        });
    };

    addSelectedBtn.onclick = () => {
        addChordBtn.click();
    };

    const updateAnalysis = () => {
        const midis = Array.from(selectedMidis);
        const activeChord = playbackChord || (midis.length > 0 ? identifyChord(midis) : null);

        if (!activeChord && midis.length === 0) {
            const chordSuffixes = {
                'Major': '', 'Minor': 'm', 'Diminished': 'dim', 'Augmented': 'aug',
                'Sus4': 'sus4', 'Sus2': 'sus2', 'Maj7': 'maj7', 'Min7': 'm7',
                'Dom7': '7', 'Dim7': 'dim7', 'm7b5': 'm7b5', 'HalfDim7': 'm7b5'
            };
            const suffix = chordSuffixes[currentQuickType] || '';
            chordNameDisplay.textContent = `${currentQuickRoot}${suffix}`;
            chordDetailsDisplay.textContent = `Quick Selected | Type: ${currentQuickType}`;
            chordNameDisplay.classList.remove('playback-active');
            addChordBtn.disabled = false;
        } else if (activeChord) {
            chordNameDisplay.textContent = activeChord.name || 'Cluster';
            chordDetailsDisplay.textContent = activeChord.details || `Type: ${activeChord.type} | Root: ${activeChord.root}`;
            if (playbackChord) chordNameDisplay.classList.add('playback-active');
            else chordNameDisplay.classList.remove('playback-active');
            addChordBtn.disabled = false;
        }
    };

    onFretClick(({ midi, element }) => {
        if (isPlaying) return;

        const stringIdx = element.closest('.string').classList[1].split('-')[1];
        const fretIdx = element.dataset.fret;
        const cellId = `s${stringIdx}f${fretIdx}`;
        const marker = element.querySelector('.note-marker');

        if (isGuidanceActive) {
            if (element.classList.contains('candidate') || element.classList.contains('selected')) {
                const isAlreadySelected = element.classList.contains('selected');
                
                if (isAlreadySelected) {
                    element.classList.remove('selected');
                    element.classList.add('candidate');
                    selectedMidis.delete(midi);
                    selectedCells = selectedCells.filter(c => c.id !== cellId);
                } else {
                    element.classList.remove('candidate', 'dimmed');
                    element.classList.add('selected');
                    selectedMidis.add(midi);
                    selectedCells.push({ id: cellId, midi, string: stringIdx, fret: fretIdx });
                    playChord([midi]);
                }

                const hasAnySelected = container.querySelectorAll('.fret.selected').length > 0;
                container.querySelectorAll('.fret.candidate').forEach(f => {
                    if (hasAnySelected) f.classList.add('dimmed');
                    else f.classList.remove('dimmed');
                });
                
                updateAnalysis();
                return;
            }
        }

        const existingIdx = selectedCells.findIndex(c => c.id === cellId);
        if (existingIdx !== -1) {
            selectedCells.splice(existingIdx, 1);
            selectedMidis.delete(midi);
            marker.classList.add('hidden');
            element.classList.remove('midi-user');
            element.classList.remove('selected');
        } else {
            selectedCells.push({ id: cellId, midi, string: stringIdx, fret: fretIdx });
            selectedMidis.add(midi);
            marker.classList.remove('hidden');
            marker.classList.add('active', 'midi-user');
            element.classList.add('midi-user', 'selected');
            playChord([midi]);
            isGuidanceActive = false;
        }
        updateAnalysis();
    });

    clearBtn.addEventListener('click', () => {
        selectedMidis.clear();
        selectedCells = [];
        isGuidanceActive = false;
        document.querySelectorAll('.fret').forEach(f => {
            f.classList.remove('midi-user', 'candidate', 'selected', 'dimmed');
            const m = f.querySelector('.note-marker');
            if (m) m.classList.add('hidden');
        });
        updateAnalysis();
    });

    addChordBtn.addEventListener('click', () => {
        let midis = Array.from(selectedMidis);
        let cells = [...selectedCells];
        let chordName = '';
        let chordDetails = '';

        const chordSuffixes = {
            'Major': '', 'Minor': 'm', 'Diminished': 'dim', 'Augmented': 'aug',
            'Sus4': 'sus4', 'Sus2': 'sus2', 'Maj7': 'maj7', 'Min7': 'm7',
            'Dom7': '7', 'Dim7': 'dim7', 'm7b5': 'm7b5', 'HalfDim7': 'm7b5'
        };

        if (midis.length === 0) {
            // Auto-Voicing Generator: Auto-selects fret positions for the quick select chord tones
            const formula = getChordFormula(currentQuickType);
            const notes = getChordNotes(currentQuickRoot, currentQuickType, 4);

            // Assign strings: 4-part voicing uses strings 4,3,2,1. 3-part uses strings 3,2,1.
            const stringSet = formula.length === 4 ? [3, 2, 1, 0] : [2, 1, 0];
            const sortedStrings = [...stringSet].sort((a, b) => b - a);

            let targetDegrees = [];
            if (formula.length === 4) {
                targetDegrees = [formula[0], formula[2], formula[3], formula[1]]; // Root position Drop 2
            } else {
                targetDegrees = [formula[0], formula[1], formula[2]]; // Root position Closed
            }

            const stringNoteNames = targetDegrees.map(deg => {
                const idx = formula.indexOf(deg);
                return idx !== -1 ? notes[idx].match(/^[A-Ga-g][b#]?/)[0] : null;
            });

            // Find matching frets on the assigned strings
            sortedStrings.forEach((strIdx, i) => {
                const noteName = stringNoteNames[i];
                if (!noteName) return;

                const stringBaseMidi = [64, 59, 55, 50, 45, 40][strIdx];
                for (let fret = 0; fret <= 15; fret++) {
                    const midiNote = stringBaseMidi + fret;
                    const testNoteName = getNoteName(midiNote);
                    if (testNoteName === noteName) {
                        midis.push(midiNote);
                        cells.push({
                            id: `s${strIdx}f${fret}`,
                            midi: midiNote,
                            string: strIdx.toString(),
                            fret: fret.toString()
                        });
                        break;
                    }
                }
            });

            const suffix = chordSuffixes[currentQuickType] || '';
            chordName = `${currentQuickRoot}${suffix}`;
            chordDetails = `Type: ${currentQuickType} | Root: ${currentQuickRoot} (Auto-Voiced)`;
        } else {
            const result = identifyChord(midis);
            chordName = result.name || 'Cluster';
            chordDetails = result.type ? `Type: ${result.type} | Root: ${result.root}` : 'Unknown combination';
        }

        if (midis.length === 0) return;

        const chordObj = {
            id: Date.now(),
            name: chordName,
            midis: [...midis],
            cells: [...cells],
            details: chordDetails
        };
        
        progression.push(chordObj);
        renderProgression();
        clearBtn.click();
    });

    const renderProgression = () => {
        if (progression.length === 0) {
            progressionList.innerHTML = `
                <div class="empty-timeline-message">
                    <i data-lucide="info"></i>
                    Add chords to see them here
                </div>
            `;
            playAllBtn.disabled = true;
            statsDisplay.textContent = '0 Chords';
            lucide.createIcons({ root: progressionList });
            return;
        }

        playAllBtn.disabled = false;
        statsDisplay.textContent = `${progression.length} Chords`;
        progressionList.innerHTML = '';
        
        progression.forEach((chord, index) => {
            const card = document.createElement('div');
            card.className = 'chord-card glass';
            card.innerHTML = `
                <div class="card-index">${index + 1}</div>
                <div class="card-name">${chord.name}</div>
                <div class="card-details">${chord.details}</div>
                <div class="card-actions">
                    <button class="play-card-btn" title="Play">
                        <i data-lucide="play" size="16"></i>
                    </button>
                    <button class="delete-card-btn" title="Delete">
                        <i data-lucide="x" size="16"></i>
                    </button>
                </div>
            `;
            
            card.querySelector('.play-card-btn').addEventListener('click', async (e) => {
                e.stopPropagation();
                if (isPlaying) return;
                
                playbackMidis = chord.midis;
                playbackChord = { name: chord.name, details: chord.details };
                updateAnalysis();
                
                chord.cells.forEach(cell => {
                    const el = document.querySelector(`.string-${cell.string} .fret[data-fret="${cell.fret}"]`);
                    if (el) el.classList.add('playback-highlight');
                });

                card.classList.add('playing');
                
                // Play individual card with the selected rhythm strum pattern
                const bpm = parseInt(bpmSlider.value, 10);
                const rhythm = rhythmSelect.value;
                const timeSig = timeSigSelect.value;
                const beatsPerMeasure = timeSig === '3/4' ? 3 : 4;
                const oneBeatMs = 60000 / bpm;
                const oneMeasureMs = oneBeatMs * beatsPerMeasure;

                let numHits = 1;
                let hitIntervalMs = oneMeasureMs;
                let noteDuration = '1n';

                if (rhythm === '4n') {
                    numHits = beatsPerMeasure;
                    hitIntervalMs = oneBeatMs;
                    noteDuration = '4n';
                } else if (rhythm === '8n') {
                    numHits = beatsPerMeasure * 2;
                    hitIntervalMs = oneBeatMs * 0.5;
                    noteDuration = '8n';
                } else if (rhythm === '2n') {
                    numHits = timeSig === '3/4' ? 1 : 2;
                    hitIntervalMs = oneBeatMs * 2;
                    noteDuration = '2n';
                }

                for (let hit = 0; hit < numHits; hit++) {
                    playChord(chord.midis, noteDuration);
                    if (rhythm === '2n' && timeSig === '3/4') {
                        await new Promise(resolve => setTimeout(resolve, oneBeatMs * 2));
                        await new Promise(resolve => setTimeout(resolve, oneBeatMs * 1));
                    } else {
                        await new Promise(resolve => setTimeout(resolve, hitIntervalMs));
                    }
                }
                
                card.classList.remove('playing');
                chord.cells.forEach(cell => {
                    const el = document.querySelector(`.string-${cell.string} .fret[data-fret="${cell.fret}"]`);
                    if (el) el.classList.remove('playback-highlight');
                });
                playbackMidis = null;
                playbackChord = null;
                updateAnalysis();
            });

            card.querySelector('.delete-card-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                progression = progression.filter(c => c.id !== chord.id);
                renderProgression();
            });

            progressionList.appendChild(card);
        });

        lucide.createIcons({ root: progressionList });
    };

    const drawLissajous = () => {
        if (!container.isConnected) {
            cancelAnimationFrame(animationId);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const activeMidis = playbackMidis || Array.from(selectedMidis);
        const midis = [...activeMidis].sort((a, b) => a - b);
        
        const time = Date.now() / 1000;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width * 0.38;

        if (midis.length >= 2) {
            const f1 = 440 * Math.pow(2, (midis[0] - 69) / 12);
            const f2 = 440 * Math.pow(2, (midis[midis.length-1] - 69) / 12);
            const ratio = f1 / f2;

            ctx.beginPath();
            ctx.strokeStyle = '#a78bfa';
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#8b5cf6';

            for (let t = 0; t < Math.PI * 4; t += 0.02) {
                const x = centerX + radius * Math.sin(t + time * 2);
                const y = centerY + radius * Math.sin(t / ratio + time * 1.5);
                if (t === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        } else if (midis.length === 1) {
            const radiusPulse = radius * 0.8 + Math.sin(time * 8) * 4;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radiusPulse, 0, Math.PI * 2);
            ctx.strokeStyle = '#34d399';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#10b981';
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.setLineDash([5, 10]);
            ctx.arc(centerX, centerY, radius * 0.7, time, time + Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        animationId = requestAnimationFrame(drawLissajous);
    };

    drawLissajous();

    loopBtn.addEventListener('click', () => {
        isLooping = !isLooping;
        loopBtn.classList.toggle('active', isLooping);
        if (isLooping) {
            loopBtn.style.color = 'var(--secondary-glow)';
            loopBtn.style.borderColor = 'var(--secondary-glow)';
        } else {
            loopBtn.style.color = '';
            loopBtn.style.borderColor = '';
        }
    });

    playAllBtn.addEventListener('click', async () => {
        if (isPlaying) {
            isPlaying = false;
            return;
        }
        
        if (progression.length === 0) return;
        
        isPlaying = true;
        playAllBtn.innerHTML = '<i data-lucide="square"></i> Stop';
        lucide.createIcons({ root: playAllBtn });

        const runPlayback = async () => {
            const bpm = parseInt(bpmSlider.value, 10);
            const rhythm = rhythmSelect.value;
            const timeSig = timeSigSelect.value;
            const beatsPerMeasure = timeSig === '3/4' ? 3 : 4;
            const oneBeatMs = 60000 / bpm;
            const oneMeasureMs = oneBeatMs * beatsPerMeasure;

            let numHits = 1;
            let hitIntervalMs = oneMeasureMs;
            let noteDuration = '1n';

            if (rhythm === '4n') {
                numHits = beatsPerMeasure;
                hitIntervalMs = oneBeatMs;
                noteDuration = '4n';
            } else if (rhythm === '8n') {
                numHits = beatsPerMeasure * 2;
                hitIntervalMs = oneBeatMs * 0.5;
                noteDuration = '8n';
            } else if (rhythm === '2n') {
                numHits = timeSig === '3/4' ? 1 : 2;
                hitIntervalMs = oneBeatMs * 2;
                noteDuration = '2n';
            }

            for (let i = 0; i < progression.length; i++) {
                if (!isPlaying) break;

                const chord = progression[i];
                const card = progressionList.children[i];
                
                playbackMidis = chord.midis;
                playbackChord = { name: chord.name, details: chord.details };
                updateAnalysis();

                if (card) card.classList.add('active-play');
                
                chord.cells.forEach(cell => {
                    const el = document.querySelector(`.string-${cell.string} .fret[data-fret="${cell.fret}"]`);
                    if (el) el.classList.add('playback-highlight');
                });

                // Play the chord repeatedly within the measure based on the selected rhythm
                for (let hit = 0; hit < numHits; hit++) {
                    if (!isPlaying) break;
                    playChord(chord.midis, noteDuration);

                    if (rhythm === '2n' && timeSig === '3/4') {
                        await new Promise(resolve => setTimeout(resolve, oneBeatMs * 2));
                        if (!isPlaying) break;
                        await new Promise(resolve => setTimeout(resolve, oneBeatMs * 1));
                    } else {
                        await new Promise(resolve => setTimeout(resolve, hitIntervalMs));
                    }
                }
                
                if (card) card.classList.remove('active-play');
                chord.cells.forEach(cell => {
                    const el = document.querySelector(`.string-${cell.string} .fret[data-fret="${cell.fret}"]`);
                    if (el) el.classList.remove('playback-highlight');
                });
            }
        };

        do {
            await runPlayback();
        } while (isLooping && isPlaying);
        
        isPlaying = false;
        playbackMidis = null;
        playbackChord = null;
        updateAnalysis();
        playAllBtn.innerHTML = '<i data-lucide="play-circle"></i> Play';
        lucide.createIcons({ root: playAllBtn });
    });

    // Draw initial rhythm display
    setTimeout(drawRhythmNotation, 100);
    setTimeout(updateAnalysis, 100);
}

// --- js/modes/mode8.js ---


function mode8_render(container, currentKey) {
    container.innerHTML = `
        <div class="mode-container caged-mode">
            <div class="builder-dashboard glass">
                <div class="dashboard-main caged-dashboard">
                    <div class="chord-info-pill">
                        <div id="caged-chord-name" class="chord-name-compact">C Major</div>
                        <div id="caged-shape-name" class="chord-details-compact">C-Form</div>
                    </div>
                </div>
            </div>

            <!-- Root Selector -->
            <div class="caged-controls card glass">
                <div class="selector-section">
                    <div class="section-label">Root Note</div>
                    <div id="caged-root-btns" class="compact-grid"></div>
                </div>
                
                <div class="selector-section">
                    <div class="section-label">CAGED Form</div>
                    <div id="caged-shape-btns" class="caged-tabs">
                        <button class="caged-tab active" data-shape="C">C Form</button>
                        <button class="caged-tab" data-shape="A">A Form</button>
                        <button class="caged-tab" data-shape="G">G Form</button>
                        <button class="caged-tab" data-shape="E">E Form</button>
                        <button class="caged-tab" data-shape="D">D Form</button>
                    </div>
                </div>
            </div>

            <div id="fretboard-container-mode8" class="builder-fretboard-large glass"></div>
        </div>
    `;

    initFretboard('fretboard-container-mode8');

    const roots = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
    let currentRoot = 'C';
    let currentShape = 'C';

    const rootBtnsContainer = document.getElementById('caged-root-btns');
    roots.forEach(r => {
        const btn = document.createElement('button');
        btn.className = `mini-btn ${r === currentRoot ? 'active' : ''}`;
        btn.textContent = r;
        btn.addEventListener('click', () => {
            currentRoot = r;
            rootBtnsContainer.querySelectorAll('.mini-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateCAGED();
        });
        rootBtnsContainer.appendChild(btn);
    });

    const shapeBtns = document.querySelectorAll('.caged-tab');
    shapeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            currentShape = btn.dataset.shape;
            shapeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateCAGED();
        });
    });

    const cagedShapes = {
        'C': { rootString: 4, offsets: { 4: { f: 0, r: 'R' }, 3: { f: -1, r: '3' }, 2: { f: -3, r: '5' }, 1: { f: -2, r: 'R' }, 0: { f: -3, r: '3' } } },
        'A': { rootString: 4, offsets: { 4: { f: 0, r: 'R' }, 3: { f: 2, r: '5' }, 2: { f: 2, r: 'R' }, 1: { f: 2, r: '3' }, 0: { f: 0, r: '5' } } },
        'G': { rootString: 5, offsets: { 5: { f: 0, r: 'R' }, 4: { f: -1, r: '3' }, 3: { f: -3, r: '5' }, 2: { f: -3, r: 'R' }, 1: { f: -3, r: '3' }, 0: { f: 0, r: 'R' } } },
        'E': { rootString: 5, offsets: { 5: { f: 0, r: 'R' }, 4: { f: 2, r: '5' }, 3: { f: 2, r: 'R' }, 2: { f: 1, r: '3' }, 1: { f: 0, r: '5' }, 0: { f: 0, r: 'R' } } },
        'D': { rootString: 3, offsets: { 3: { f: 0, r: 'R' }, 2: { f: 2, r: '5' }, 1: { f: 3, r: 'R' }, 0: { f: 2, r: '3' } } }
    };

    function updateCAGED() {
        document.getElementById('caged-chord-name').textContent = `${currentRoot} Major`;
        document.getElementById('caged-shape-name').textContent = `${currentShape}-Form`;
        clearFretboard();

        // Clear previous CAGED custom classes
        document.querySelectorAll('#fretboard-container-mode8 .fret').forEach(f => {
            f.classList.remove('caged-root', 'caged-chord-tone');
            const m = f.querySelector('.note-marker');
            if (m) m.classList.remove('caged-root-marker', 'caged-chord-tone-marker');
        });

        const shapeConfig = cagedShapes[currentShape];
        const minOffset = Math.min(...Object.values(shapeConfig.offsets).map(o => o.f));
        
        // Find the lowest valid anchor fret for the root note on the rootString
        const stringDiv = document.querySelector(`#fretboard-container-mode8 .string-${shapeConfig.rootString}`);
        const frets = stringDiv.querySelectorAll('.fret');
        
        let anchorFret = -1;
        // Search from fret 0 upwards
        for (let i = 0; i < frets.length; i++) {
            const f = frets[i];
            // Get base note without octave. data-note might be "C4", "C#3", etc.
            // But wait, fretboard.js getNoteName returns "C", "C#".
            const noteName = f.dataset.note.match(/^[A-Ga-g][b#]?/)[0];
            if (noteName === currentRoot) {
                const fretNum = parseInt(f.dataset.fret);
                if (fretNum + minOffset >= 0 && fretNum + minOffset <= 15) { // Ensure entire shape fits
                    anchorFret = fretNum;
                    break; // Pick the first valid one
                }
            }
        }

        if (anchorFret === -1) {
            console.error("Could not find a valid anchor fret for this shape on the fretboard.");
            return;
        }

        // Draw the shape
        Object.keys(shapeConfig.offsets).forEach(strIdx => {
            const offsetInfo = shapeConfig.offsets[strIdx];
            const targetFretNum = anchorFret + offsetInfo.f;
            
            const cell = document.querySelector(`#fretboard-container-mode8 .string-${strIdx} .fret[data-fret="${targetFretNum}"]`);
            if (cell) {
                const marker = cell.querySelector('.note-marker');
                marker.classList.remove('hidden');
                
                if (offsetInfo.r === 'R') {
                    cell.classList.add('caged-root');
                    marker.classList.add('caged-root-marker');
                } else {
                    cell.classList.add('caged-chord-tone');
                    marker.classList.add('caged-chord-tone-marker');
                }
                marker.textContent = offsetInfo.r; // Display interval (R, 3, 5)
            }
        });
    }

    // Initial render
    setTimeout(updateCAGED, 100);
}

var currentKey = 'C';
var currentMode = 'mode1';
var midiInitialized = false;

var modes = {
    'mode1': { title: 'Note Mastery', description: 'Identify the note or chord being played.', render: mode1_render },
    'mode2': { title: 'Chord Progressions', description: 'Listen to the progression and identify the chords.', render: mode2_render },
    'mode3': { title: 'Relative Melody', description: 'Identify the melody using relative scale degrees (1, 2, 3...).', render: mode3_render },
    'mode4': { title: 'Melody & Chords', description: 'Listen to a melody and match the chord progression that fits.', render: mode4_render },
    'mode5': { title: 'Chord Explorer', description: 'Visualize triads across different string sets to learn their shapes.', render: mode5_render },
    'mode6': { title: 'Fretboard Geometry', description: 'Master the spatial relationships between notes on the neck.', render: mode6_render },
    'mode7': { title: 'Harmony Builder', description: 'Build chord progressions', render: mode7_render },
    'mode8': { title: 'CAGED System Master', description: 'Visualize the 5 CAGED shapes across the fretboard.', render: mode8_render }
};

function initApp() {
    const navBtns = document.querySelectorAll('.nav-btn');
    const keySelector = document.getElementById('key-selector');
    const viewContainer = document.getElementById('view-container');
    const viewTitle = document.getElementById('view-title');
    const viewDescription = document.getElementById('view-description');

    if (!viewContainer) {
        console.error("Critical error: view-container not found.");
        return;
    }

    // Handle Navigation
    navBtns.forEach(btn => {
        btn.addEventListener('click', async () => {
            // 1. UI Feedback Immediate (No await)
            navBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            currentMode = btn.dataset.mode;
            if (viewTitle) viewTitle.textContent = modes[currentMode].title;
            if (viewDescription) viewDescription.textContent = modes[currentMode].description;
            
            renderCurrentMode();

            // 2. Audio/MIDI Initialization in background
            try {
                initAudio(); // Don't await here to prevent blocking UI
                
                if (!midiInitialized) {
                    initMidi((status) => {
                        const pill = document.getElementById('midi-status');
                        const text = document.getElementById('midi-status-text');
                        if (pill && text) {
                            text.textContent = `MIDI: ${status}`;
                            if (status === 'Connected') pill.classList.add('connected');
                            else pill.classList.remove('connected');
                            lucide.createIcons({ root: pill });
                        }
                    });
                    midiInitialized = true;
                }
            } catch (err) {
                console.warn("Async init failed", err);
            }
        });
    });

    // Handle Global Key Change
    if (keySelector) {
        keySelector.addEventListener('change', (e) => {
            currentKey = e.target.value;
            renderCurrentMode(); 
        });
    }

    function renderCurrentMode() {
        try {
            stopAll();
            viewContainer.innerHTML = '';
            
            // Hide global fretboard for modes that render their own custom fretboards
            const globalFretboard = document.querySelector('main > #fretboard-container');
            if (globalFretboard) {
                if (currentMode === 'mode7' || currentMode === 'mode8') {
                    globalFretboard.style.display = 'none';
                } else {
                    globalFretboard.style.display = 'block';
                }
            }

            modes[currentMode].render(viewContainer, currentKey);
            lucide.createIcons();
        } catch (err) {
            console.error("Render failed", err);
            viewContainer.innerHTML = `<p style="color:red; padding: 2rem;">Render Error: ${err.message}</p>`;
        }
    }

    // Initial Render
    renderCurrentMode();
}

// Support both early and late script loading
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
} else {
    initApp();
}

        if (typeof lucide !== 'undefined') lucide.createIcons();
    } catch(e) {
        var errEl = document.getElementById('error-content');
        var errBox = document.getElementById('error-display');
        if (errEl && errBox) {
            errBox.style.display = 'block';
            errEl.innerText += 'INIT: ' + e.message + '\n' + (e.stack || '') + '\n';
        }
        console.error('Auralis Init Error:', e);
    }
